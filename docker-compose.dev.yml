services:
  docs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - docs_node_modules:/app/node_modules
    ports:
      - "3001:3000"
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npx docusaurus start --host 0.0.0.0 --port 3000 --poll 1000"

volumes:
  docs_node_modules:
